<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>number-Variable1-Js</title>
    <script>
        function main()
        {
            let n;
            n=10
            console.log(n);
            console.log(typeof n); 
            n=1.4
            console.log(n);
            console.log(typeof n); 
            n=NaN;
            console.log(n,typeof n);
            n=Infinity;
            console.log(n,typeof n);
            n=-Infinity;
            console.log(n,typeof n);
        }
        main();
        
    </script>
</head>
<body>
    <h1>number-Variable</h1>
</body>
</html>
