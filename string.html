<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>string-Variable1-Js</title>
    <script>
        function main()
        {
            let str;
            str="Hello, World!";
            console.log(str,typeof str);
            str="H";
            console.log(str,typeof str);
            str='Hello World';
            console.log(str,typeof str);
            str=`Hello World`;
            console.log(str,typeof str);
        }
        main();
        
    </script>
</head>
<body>
    <h1>string-Variable</h1>
</body>
</html>
